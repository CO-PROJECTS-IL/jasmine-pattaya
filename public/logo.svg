<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#d4b96a"/>
      <stop offset="100%" stop-color="#a88a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d4b96a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Jasmine flower - 5 petals -->
  <g transform="translate(256, 200)">
    <!-- Petal 1 - top -->
    <path d="M0,-85 C20,-75 30,-45 25,-20 C20,5 10,15 0,18 C-10,15 -20,5 -25,-20 C-30,-45 -20,-75 0,-85Z" fill="url(#gold)" opacity="0.95"/>
    <!-- Petal 2 - top right -->
    <path d="M0,-85 C20,-75 30,-45 25,-20 C20,5 10,15 0,18 C-10,15 -20,5 -25,-20 C-30,-45 -20,-75 0,-85Z" fill="url(#gold)" opacity="0.85" transform="rotate(72)"/>
    <!-- Petal 3 - bottom right -->
    <path d="M0,-85 C20,-75 30,-45 25,-20 C20,5 10,15 0,18 C-10,15 -20,5 -25,-20 C-30,-45 -20,-75 0,-85Z" fill="url(#gold)" opacity="0.75" transform="rotate(144)"/>
    <!-- Petal 4 - bottom left -->
    <path d="M0,-85 C20,-75 30,-45 25,-20 C20,5 10,15 0,18 C-10,15 -20,5 -25,-20 C-30,-45 -20,-75 0,-85Z" fill="url(#gold)" opacity="0.80" transform="rotate(216)"/>
    <!-- Petal 5 - top left -->
    <path d="M0,-85 C20,-75 30,-45 25,-20 C20,5 10,15 0,18 C-10,15 -20,5 -25,-20 C-30,-45 -20,-75 0,-85Z" fill="url(#gold)" opacity="0.90" transform="rotate(288)"/>

    <!-- Center -->
    <circle cx="0" cy="0" r="14" fill="#d4b96a"/>
    <circle cx="0" cy="0" r="8" fill="#a88a3a"/>

    <!-- Small stamens -->
    <circle cx="0" cy="-8" r="2.5" fill="#e8d48b"/>
    <circle cx="7.6" cy="-2.5" r="2.5" fill="#e8d48b"/>
    <circle cx="4.7" cy="6.5" r="2.5" fill="#e8d48b"/>
    <circle cx="-4.7" cy="6.5" r="2.5" fill="#e8d48b"/>
    <circle cx="-7.6" cy="-2.5" r="2.5" fill="#e8d48b"/>
  </g>

  <!-- "jasmine" text -->
  <text x="256" y="360" text-anchor="middle" font-family="Georgia, 'Frank Ruhl Libre', serif" font-size="64" font-weight="700" letter-spacing="6" fill="url(#gold)">jasmine</text>

  <!-- Decorative line -->
  <line x1="156" y1="385" x2="356" y2="385" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>

  <!-- "PATTAYA" subtitle -->
  <text x="256" y="415" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="12" fill="#c9a84c" opacity="0.6">PATTAYA</text>
</svg>
